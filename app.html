<!DOCTYPE html>
<html lang="en" >
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AppPage</title>
    <!--<link rel="stylesheet" href="ss.css">-->
   <link rel="stylesheet" href="stylesheet.css">
</head>
<body>
<!--Modal Section-->
<div id="Modalname" style="display: none;">
    <div class="modal-content">
        <h3>Enter Your Name</h3>
        <input type="text" id="player-name" placeholder="Your name">
        <button id="startbutton">Start Game</button>
        <button id="cancelbutton">Cancel</button>
    </div>
</div>
<!--This Section is for the Navigation Bar/ Header-->
<header>
    <a href="index.html"> <img src="images/logo.jpg" id="imglogo" alt="Emerald Hunters Logo"> </a>
    <a href="index.html" class="title"><h3 class="title">EMERALD HUNTERS</h3></a>
    <a href="index.html" class="back-main-link">Back to Main Page</a>
    
</header>

<!--This Section is for the Main content of the page-->
<main>
    <!--Selection Area with  Treasure Hunts to select from and Reset or Submit buttons as well-->
    <section id="SelectionArea">
        <h3>Select TreasureHunt</h3>
        <br>
        <br>
        <div id="TrHuntList"></div>
        <br>
        <br>
        <button id="submitTrHunt">Start</button>
    </section>
<br>
    <br>
    
    <!--GameArea with TreasureHunt-Question and Options to Answer with a Submit/Skip button-->
    <section id="GameArea" style="display: none">
        <h3 id="QuestionText"></h3>
        <div id="AnswerArea"></div>
<br>
        <br>
        <button id ="SubmitAnswerBtn">Submit Answer</button>
        <br>
        
        <button id ="SkipAnswerBtn">Skip Answer</button>
        <button id ="SendLocationBtn" style="display: none">Share Location</button>
<br>
        <br>
        <div id="scoreDisplay">Score: 0</div>
        <button id="leaderboardbtn">View Leaderboard</button>
        <div id="feedback"></div>
    </section>

    <!--LeaderBoard Area-->
    <div id="leaderboardModal" class="modal" style="display: none;">
        <div id="leaderboard-content">
            <h2 id="leaderboardTitle">TreasureHunt leaderboard</h2>
            <ul id="leaderboardList"></ul>
            <button id="closeLeaderboardBtn" class="btn">close</button>
        </div>
    </div>

</main>


<!--This Section is for the Footer of the page-->
<footer>
     <div class="footer-content">
        <div class="FollowUs">
            <a href="https://x.com/TreasureHuntTE" class="social-link">
                <img src="twitter.png" alt="Twitter" class="iconBtn">
            </a>
            <a href="https://www.facebook.com/profile.php?id=61579670334066" class="social-link">
                <img src="facebook.png" alt="Facebook" class="iconBtn">
            </a>
            <a href="https://www.instagram.com/emeraldhunters_te/?hl=en" class="social-link">
                <img src="instagram.png" alt="Instagram" class="iconBtn">
            </a>
            <a href="https://www.youtube.com/channel/UCvAPt6gM_dvbDr00ZbnuROQ" class="social-link">
                <img src="youtube.png" alt="Youtube" class="iconBtn">
            </a>
        </div>
    </div>
    <div>
        <p>© 2026 Emerald Hunters. All rights reserved.</p>
        <p>FIND THE TREASURE</p>
    </div>
</footer>

<script src="app.js"></script>
</body>
</html>
