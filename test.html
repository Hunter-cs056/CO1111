<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Leaderboard test</title>
</head>
<body>


<p>Enter input:</p>

<form action="javascript:testLeaderboardManually()">
    <input type="number" id="size" />
    <button id="submit">Submit</button>
</form>

<table id="test-results-table" border="1">
    <tr>
        <th>Input</th>
        <th>Expected leaderboard size</th>
        <th>Computed leaderboard size</th>
        <th>Expected numOfPlayers</th>
        <th>Computed numOfPlayers</th>
        <th>Expected status</th>
        <th>Computed status</th>
        <th>Pass/Fail</th>
    </tr>
</table>

<script>

    const testResultsTable = document.getElementById('test-results-table');

    testPairs = [
        { size: 1, leaderboardSize: 1, numOfPlayers: 1, status: "OK" },
        { size: 3, leaderboardSize: 3, numOfPlayers: 3, status: "OK" },
        { size: -1, leaderboardSize: 0, numOfPlayers: 0, status: "ERROR" },
    ]

    async function testLeaderboardManually() {
        const sizeField = document.getElementById('size');
        const size = Number(sizeField.value);
        const response = await fetch(`https://codecyprus.org/th/test-api/leaderboard?size=${size}`);
        const json = await response.json();
        const status = json.status;
        const leaderboardSize = json.leaderboard.length;
        const numOfPlayers = json.numOfPlayers;
        if (status === "OK") {
            if (leaderboardSize === size && numOfPlayers === size) {
                alert("PASS");
            }
        }
        else {
            alert("FAIL");
        }

    }

    async function getLeaderboard() {
        const sizeField = document.getElementById('size');
        const size = Number(sizeField.value);
        let html = "";

        for (let pair of testPairs) {
            const response = await fetch(`https://codecyprus.org/th/test-api/leaderboard?size=${pair.size}`);
            const json = await response.json();
            const status = json.status;
            const leaderboardSize = json.leaderboard.length;
            const numOfPlayers = json.numOfPlayers;

            // console.log(pair.size);
            // console.log(pair.numOfPlayers);
            // console.log(pair.status);

            // console.log(pair);

            let success = true;
            if (status !== pair.status) {
                success = false;
            }
            if (leaderboardSize !== pair.leaderboardSize) {
                success = false;
            }
            if (numOfPlayers !== pair.numOfPlayers) {
                success = false;
            }

            // console.log(status);
            // console.log(leaderboardSize);
            // console.log(numOfPlayers);

            html += "<tr>" +
                "    <td>" + size + "</td>\n" +
                "    <td>" + pair.leaderboardSize + "</td>\n" +
                "    <td>" + leaderboardSize + "</td>\n" +
                "    <td>" + pair.numOfPlayers + "</td>\n" +
                "    <td>" + numOfPlayers +"</td>\n" +
                "    <td>" + pair.status + "</td>\n" +
                "    <td>" + status + "</td>\n" +
                "    <td>" + (success ? "✅" : "❌") + "</td>" +
                "</tr>";
        }



        testResultsTable.innerHTML += html;

    }

    getLeaderboard();

</script>



</body>
</html>
